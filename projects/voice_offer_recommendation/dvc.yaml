stages:
  transform_features:
    cmd: cd dbt && dbt run --profiles-dir .
    deps:
      - dbt/models/
      - dbt/dbt_project.yml
    outs:
      - dbt/target/:
          cache: false
          persist: false

  feast_apply:
    cmd: cd feature_repo && feast apply
    deps:
      - src/data/feast_apply.py
      - feature_repo/feature_definitions.py
      - feature_repo/feature_store.yaml
      - configs/config.yaml
    outs:
      - feature_repo/data/registry.db:
          cache: false
          persist: false

  fetch_features:
    cmd: python -m src.data.fetch_features
    deps:
      - src/data/fetch_features.py
      - feature_repo/feature_definitions.py
      - feature_repo/feature_store.yaml
      - feature_repo/data/registry.db
      - configs/config.yaml
    outs:
      - data/processed/training_features.parquet:
          cache: true
          persist: false

  train:
    cmd: python -m src.model.train
    deps:
      - src/model/train.py
      - src/model/recommendation_algorithm.py
      - data/processed/training_features.parquet
      - configs/config.yaml
    outs:
      - models/model.joblib:
          cache: true
          persist: false
      - metrics/metrics.json:
          cache: false
          persist: true

  evaluate:
    cmd: python -m src.model.evaluate
    deps:
      - src/model/evaluate.py
      - models/model.joblib
      - data/processed/training_features.parquet
      - configs/config.yaml
    outs:
      - metrics/evaluation_report.txt:
          cache: false
          persist: true