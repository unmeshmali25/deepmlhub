project: voice_offer_recommendation
registry: data/registry.db
provider: local

online_store:
    type: postgres
    host: {{ env_var('SUPABASE_DB_HOST') }}
    port: 6543
    database: postgres
    db_schema: feast
    user: {{ env_var('SUPABASE_DB_USER') }}
    password: {{ env_var('SUPABASE_DB_PASSWORD') }}
    entity_key_serialization_version: 2

offline_store:
    type: postgres
    host: {{ env_var('SUPABASE_DB_HOST') }}
    port: 5432
    database: postgres
    db_schema: dbt_vor
    user: {{ env_var('SUPABASE_DB_USER') }}
    password: {{ env_var('SUPABASE_DB_PASSWORD') }}